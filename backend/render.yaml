services:
  - type: web
    name: procura-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: procura-db
          property: connectionString
      - key: SCHEDULER_INTERVAL_MINUTES
        value: "15"
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: procura-db
    plan: free
